site_name: ast-outline
site_description: >-
  Fast, AST-based structural outline for source files across many programming
  languages (Python, TypeScript, Java, Go, Rust, C#, Swift, and more). Built
  for AI coding agents that should read the shape of a file before reading the
  whole thing.
site_url: https://ast-outline.github.io/
site_author: Dmitrii Zaitsev (dim-s)
copyright: >-
  &copy; 2026 Dmitrii Zaitsev (dim-s) and ast-outline contributors.
  Code: <a href="https://github.com/ast-outline/ast-outline/blob/main/LICENSE">Apache&nbsp;2.0</a>.
  This site (documentation): <a href="https://creativecommons.org/licenses/by/4.0/">CC&nbsp;BY&nbsp;4.0</a>
  &mdash; visible attribution required for reuse.

docs_dir: docs

theme:
  name: material
  custom_dir: overrides
  language: en
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: green
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: light green
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - announce.dismiss
  icon:
    annotation: material/arrow-right-circle

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      permalink_title: Anchor link to this section
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - pymdownx.keys

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ast-outline/ast-outline
      name: ast-outline on GitHub
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/ast-outline/
      name: ast-outline on PyPI
  generator: false

extra_css:
  - assets/extra.css

plugins:
  - search
  # Generates /llms.txt (curated index) and /llms-full.txt (whole docs as
  # one Markdown file) per the llmstxt.org convention, so LLM/AI crawlers
  # can ingest the docs without parsing the themed HTML.
  - llmstxt:
      markdown_description: >-
        ast-outline is a fast, AST-based command-line tool that prints the
        structural outline of a source file — classes, methods, fields and
        signatures with line numbers, but no method bodies. Output is 2–10×
        smaller than the source. It exists so AI coding agents (Claude Code,
        Cursor, Codex CLI, Gemini CLI) can read the *shape* of a file, or of
        a whole repository, before reading anything in full. It parses many
        programming languages via tree-sitter, including Python, TypeScript,
        Java, Go, Rust, C# and Swift.
      full_output: llms-full.txt
      sections:
        Documentation:
          - index.md: Overview, installation and quick start.
          - commands.md: Full CLI reference — every subcommand, flag and option.
          - agents.md: Wiring ast-outline into AI coding agents.
          - output-format.md: The outline, digest and grep output formats.
        About:
          - about.md: License and attribution.
          - history.md: Release history and changelog.

nav:
  - Home: index.md
  - Commands: commands.md
  - AI agents: agents.md
  - Output format: output-format.md
  - About:
      - License & attribution: about.md
      - Project history: history.md
