site_name: ast-outline
site_description: >-
  ast-outline lets AI coding agents pull exactly the code context they need —
  a repo skeleton, a file outline, or one symbol — instead of reading whole
  files. A stateless, tree-sitter-based CLI.
site_url: https://ast-outline.github.io/
site_author: Dmitrii Zaitsev (dim-s)
copyright: >-
  &copy; 2026 Dmitrii Zaitsev (dim-s) and ast-outline contributors.
  Code: <a href="https://github.com/ast-outline/ast-outline/blob/main/LICENSE">Apache&nbsp;2.0</a>.
  This site (documentation): <a href="https://creativecommons.org/licenses/by/4.0/">CC&nbsp;BY&nbsp;4.0</a>
  &mdash; visible attribution required for reuse.

docs_dir: docs

theme:
  name: material
  custom_dir: overrides
  language: en
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: green
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: light green
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - announce.dismiss
  icon:
    annotation: material/arrow-right-circle

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      permalink_title: Anchor link to this section
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - pymdownx.keys

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ast-outline/ast-outline
      name: ast-outline on GitHub
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/ast-outline/
      name: ast-outline on PyPI
  generator: false

extra_css:
  - assets/extra.css

plugins:
  - search
  # Generates /llms.txt (curated index) and /llms-full.txt (whole docs as
  # one Markdown file) per the llmstxt.org convention, so LLM/AI crawlers
  # can ingest the docs without parsing the themed HTML.
  - llmstxt:
      markdown_description: >-
        ast-outline lets AI coding agents pull exactly the code context they
        need — a whole-repo skeleton, a single file's outline, or one symbol's
        body — instead of reading whole files into the model. The result:
        cheaper, faster agent runs that don't drown in large codebases. One
        stateless, tree-sitter-based CLI does it all — map a repo (`digest`),
        outline a file (`outline`), extract a symbol (`show`), structural-grep
        for usages (`grep`), and trace imports. It parses many programming
        languages, including Python, TypeScript, Java, Go, Rust, C# and Swift,
        and is built for Claude Code, Cursor, Codex CLI and Gemini CLI.
      full_output: llms-full.txt
      sections:
        Documentation:
          - index.md: Overview, installation and quick start.
          - commands.md: Full CLI reference — every subcommand, flag and option.
          - agents.md: Wiring ast-outline into AI coding agents.
          - output-format.md: The outline, digest and grep output formats.
        About:
          - about.md: License and attribution.
          - history.md: Release history and changelog.

nav:
  - Home: index.md
  - Commands: commands.md
  - AI agents: agents.md
  - Output format: output-format.md
  - About:
      - License & attribution: about.md
      - Project history: history.md
